<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Online</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="container">
      <section id="auth-card" class="card">
        <h1 id="auth-title">Iniciar sesión</h1>
        <p id="auth-subtitle" class="muted">Accede a tu portal.</p>

        <form id="auth-form" class="form">
          <label for="email">Correo</label>
          <input id="email" name="email" type="email" required placeholder="tucorreo@dominio.com" />

          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" required minlength="6" placeholder="******" />

          <button type="submit" id="submit-btn">Entrar</button>
        </form>

        <p id="message" class="message"></p>

        <button id="toggle-mode" class="link-btn" type="button">
          ¿No tienes cuenta? Regístrate
        </button>
      </section>

      <section id="welcome-card" class="card hidden">
        <h1>Bienvenido</h1>
        <p id="welcome-text" class="muted"></p>
        <button id="logout-btn" type="button">Cerrar sesión</button>
      </section>
    </main>

    <script src="/config.js"></script>
    <script type="module" src="/app.js"></script>
  </body>
</html>
